<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto | Argus Tactical</title>

<style>

/* RESET */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: #0a0a0a;
}

/* HERO */
.contact-hero {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
              url("fotos/fondo.jpg");
  background-size: cover;
  background-position: center;
  text-align: center;
  padding: 100px 20px;
}

.contact-hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.contact-hero p {
  font-size: 18px;
  color: #ccc;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

/* GRID */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

/* CARD */
.contact-card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 10px;
  backdrop-filter: blur(8px);
}

.contact-card h2 {
  margin-bottom: 15px;
  color: #00ff88;
}

/* BOTTONI */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 12px 20px;
  background: #00ff88;
  color: black;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

/* MAPPA */
iframe {
  width: 100%;
  height: 300px;
  border: none;
  border-radius: 10px;
}

/* VIDEO */
video {
  width: 100%;
  border-radius: 10px;
  margin-top: 20px;
}

/* RESPONSIVE */
@media(max-width: 768px){
  .contact-grid {
    grid-template-columns: 1fr;
  }

  .contact-hero h1 {
    font-size: 32px;
  }
}

.contact-title {
  font-size: 60px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: linear-gradient(90deg, #00ff88, #74f76f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.contact-subtitle {
  font-size: 18px;
  color: #ccc;
  letter-spacing: 1px;
}

/* Animazione */
.contact-title {
  animation: fadeDown 1s ease;
}

@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
/*logo*/
.contact-header {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 120px;
  filter: drop-shadow(0 0 10px rgba(0,255,136,0.4));
}

/* BOTTONE PR*/
.btn-home {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: linear-gradient(90deg, #00ff88, #00c3ff);
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 30px;
  transition: 0.3s;
}

.btn-home:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,255,136,0.6);
}


.floating-home:hover {
  transform: scale(1.1);
}


</style>
</head>

<body>

    <!--LOGO-->
    <div class="contact-header">
  <img src="logo.jpg" alt="Argus Tactical Logo" class="logo">
</div>

<!-- HERO -->
<section class="contact-hero">
  <h1 class="contact-title">Contacto</h1>
  <p class="contact-title">Seguridad, confianza y profesionalismo a tu alcance</p>
</section>

<!--BUTON RETORNO-->

<a href="index.html" class="btn-home">
  ← Volver al Inicio
</a>



<!-- CONTENIDO -->
<div class="container">

  <div class="contact-grid">

    <!-- INFO -->
    <div class="contact-card">
      <h2>📞 Contacto Directo</h2>

      <p><strong>WhatsApp:</strong></p>
      <a class="btn" href="https://wa.me/573000000000" target="_blank">
        WhatsApp
      </a>

      <p><strong>Email:</strong></p>
      <p>contacto@argustactical.com</p>

      <p><strong>Dirección:</strong></p>
      <p>
        Oficina Principal<br>
        Carrera 84 # 42-59<br>
        Barrio El Caney
      </p>
    </div>

    <!-- MAPPA -->
    <div class="contact-card">
      <h2>📍 Ubicación</h2>

      <iframe 
        src="https://www.google.com/maps?q=Cali,Colombia&output=embed">
        
      </iframe>
    </div>

  </div>

  <!-- VIDEO -->
  <div class="contact-card">
    <h2>🎥 Video</h2>

    <video controls>
      <source src="video8.mp4" type="video/mp4">
      Tu navegador no soporta video
    </video>
  </div>

</div>

</body>
</html>
